---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: ubuntu2204-test
    image: geerlingguy/docker-ubuntu2204-ansible
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  inventory:
    host_vars:
      ubuntu2204-test:
        cis_level: 1
verifier:
  name: ansible
