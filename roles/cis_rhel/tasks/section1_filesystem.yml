- name: "1.3.1 | Ensure AIDE is installed"
  apt:
    name: aide
    state: present
    update_cache: yes
  when: cis_1_3_1_aide
  tags: [level1, scored, rule_1_3_1]

- name: "1.3.1 | Initialize AIDE database"
  command: aideinit
  args:
    creates: /var/lib/aide/aide.db
  when: cis_1_3_1_aide
  tags: [level1, scored, rule_1_3_1]
