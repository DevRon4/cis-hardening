---
- name: "1.1.1 | Disable cramfs filesystem"
  modprobe:
    name: cramfs
    state: absent
  when: cis_1_1_1_cramfs
  tags: [level1, scored, rule_1_1_1]

- name: "1.1.1 | Blacklist cramfs in modprobe"
  lineinfile:
    dest: /etc/modprobe.d/CIS.conf
    line: "install cramfs /bin/true"
    create: yes
  when: cis_1_1_1_cramfs
  tags: [level1, scored, rule_1_1_1]

